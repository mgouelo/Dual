<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>Séance Biathlon</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div id="container">

    <header>
        <h1 id="titre-session">Session Biathlon</h1>
        <p id="info-classe">Préparation de l'épreuve</p>
    </header>

    <div id="active-profile-card" class="profile-card">
        <div class="profile-content">
            <div class="profile-text">
                <p class="role-label">Coureur Actif</p>
                <div class="name-info">
                    <strong id="current-name">Chargement...</strong>
                    <span id="current-gender">(-)</span>
                </div>
            </div>
            <button class="button btn-switch" onclick="inverserRoles()">
                <i class="fa-solid fa-arrows-rotate"></i> Inverser
            </button>
        </div>
    </div>

    <div class="hub-sections">

        <div class="mode-group">
            <p class="mode-title">Initialisation</p>
            <button class="button" onclick="location.href='vma.html'">Faire le Test VMA</button>
        </div>

        <div class="mode-group">
            <p class="mode-title">Entraînement</p>
            <div class="btn-group">
                <button id="btn-tir" class="button" onclick="location.href='tir.html'">Tir</button>
                <button class="button" onclick="location.href='course.html'">Course</button>
            </div>
        </div>

        <hr class="separator">

        <div class="mode-group">
            <p class="mode-title">Évaluation</p>
            <button id="btn-eval" class="button btn-eval">Lancer l'Épreuve Finale</button>
        </div>

    </div>

    <footer>
        <button class="button btn-back" onclick="location.href='../pages/choix_niveau.html'">Changer de niveau</button>
    </footer>

</div>

<script src="../js/seance.js"></script>
</body>
</html>

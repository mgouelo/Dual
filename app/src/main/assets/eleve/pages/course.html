<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <div id="container">

        <header>
            <h1>Entraînement à la course</h1>
            <p>Réaliser un tour de parcours et noter son temps (x6)</p>
        </header>

        <div id="chrono">00:00:00</div>

        <div id="buttons">
            <button id="reset" class="button">Reset</button>
            <button id="stop" class="button">Arrêter</button>
            <button id="start" class="button">Démarrer</button>
            <button id="enregistrer" class="button">Enregistrer</button>
        </div>

        <div id="tours">
            <p>Tour 1 : <span id="tour1">-</span></p>
            <p>Tour 2 : <span id="tour2">-</span></p>
            <p>Tour 3 : <span id="tour3">-</span></p>
            <p>Tour 4 : <span id="tour4">-</span></p>
            <p>Tour 5 : <span id="tour5">-</span></p>
            <p>Tour 6 : <span id="tour6">-</span></p>
        </div>

        <footer>
            <p class="info">Connecté au serveur local</p>
        </footer>
    </div>

    <script src="../js/course.js"></script>
</body>
</html>

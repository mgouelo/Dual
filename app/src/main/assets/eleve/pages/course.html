<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>Course</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <div id="container">

        <header>
            <h1>Entraînement à la course</h1>
            <p>Réaliser un tour de parcours et noter son temps</p>
        </header>

        <div id="chrono">00:00:00</div>

        <div id="buttonTraining">
            <button id="reset" class="button">Reset</button>
            <button id="stop" class="button">Arrêter</button>
            <button id="start" class="button">Démarrer</button>
        </div>

        <div id="listeTours"></div>

        <div class="action-bar">
            <button id="enregistrer" class="button">Enregistrer (+1 tour)</button>
            <button id="supprimer" class="button">Supprimer (-1 tour)</button>
        </div>

        <div id="custom-confirm" class="modal">
            <div class="modal-content">
                <h3>Confirmation</h3>
                <p id="confirm-message">Êtes-vous sûr ?</p>
                <div class="modal-buttons">
                    <button id="confirm-ok" class="btn-confirm">OK</button>
                    <button id="confirm-cancel" class="btn-cancel">Annuler</button>
                </div>
            </div>
        </div>

        <button class="button btn-back" onclick="location.href='seance.html'">Retour séance</button>

        <footer>
            <p class="info">Connecté au serveur local</p>
        </footer>
    </div>

    <script src="../js/course.js"></script>
</body>
</html>

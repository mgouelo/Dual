<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tir</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="wrapper">
    <h1>Tir</h1>

    <div id="tirs">
      <p>Tir 1 : <input type="number" id="tir1" min="0" /></p>
      <p>Tir 2 : <input type="number" id="tir2" min="0" /></p>
      <p>Tir 3 : <input type="number" id="tir3" min="0" /></p>
      <p>Tir 4 : <input type="number" id="tir4" min="0" /></p>
      <p>Tir 5 : <input type="number" id="tir5" min="0" /></p>
      <p>Tir 6 : <input type="number" id="tir6" min="0" /></p>
    </div>

    <button id="calculer" class="button">Calculer moyenne</button>

    <div id="resultats" style="margin-top: 20px; font-size: 1.2em;">
      <p>Total : <span id="total">-</span></p>
      <p>Moyenne : <span id="moyenne">-</span></p>
    </div>
  </div>

  <script src="../js/tir.js"></script>
</body>
</html>

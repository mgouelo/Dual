<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tir</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="container">
    
    <header>
        <h1>Entraînement au tir</h1>
        <p>Réaliser 6 tirs à la suite en réinitialisant la cible à chaque tir</p>
    </header>

    <div id="tirs">
      <p>Tir 1 : <input type="number" id="tir1" min="0" /></p>
      <p>Tir 2 : <input type="number" id="tir2" min="0" /></p>
      <p>Tir 3 : <input type="number" id="tir3" min="0" /></p>
      <p>Tir 4 : <input type="number" id="tir4" min="0" /></p>
      <p>Tir 5 : <input type="number" id="tir5" min="0" /></p>
      <p>Tir 6 : <input type="number" id="tir6" min="0" /></p>
    </div>

    <div id="resultats">
      <p>Total : <span id="total">-</span></p>
      <p>Moyenne : <span id="moyenne">-</span></p>
    </div>

    <footer>
      <p class="info">Connecté au serveur local</p>
    </footer>
  </div>

  <script src="../js/tir.js"></script>
</body>
</html>
